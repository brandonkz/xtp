<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTP Strategy Docs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
  .nav { position: sticky; top: 0; background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 16px; z-index: 10; overflow-x: auto; white-space: nowrap; }
  .nav a { display: inline-block; padding: 8px 16px; margin-right: 8px; border-radius: 8px; color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 600; background: #0f172a; border: 1px solid #334155; }
  .nav a.active { background: #22c55e; color: #0f172a; border-color: #22c55e; }
  .doc { display: none; padding: 20px 16px 100px; max-width: 800px; margin: 0 auto; }
  .doc.active { display: block; }
  .doc h1 { font-size: 1.5rem; color: #22c55e; margin: 24px 0 12px; line-height: 1.3; }
  .doc h2 { font-size: 1.25rem; color: #f1f5f9; margin: 20px 0 10px; border-bottom: 1px solid #334155; padding-bottom: 6px; }
  .doc h3 { font-size: 1.05rem; color: #38bdf8; margin: 16px 0 8px; }
  .doc h4 { font-size: 0.95rem; color: #a78bfa; margin: 12px 0 6px; }
  .doc p { line-height: 1.7; margin-bottom: 12px; color: #cbd5e1; }
  .doc ul, .doc ol { margin: 8px 0 16px 20px; }
  .doc li { margin-bottom: 6px; line-height: 1.6; color: #cbd5e1; }
  .doc strong { color: #f1f5f9; }
  .doc code { background: #1e293b; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; color: #22c55e; }
  .doc pre { background: #1e293b; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 12px 0; border: 1px solid #334155; }
  .doc pre code { background: none; padding: 0; }
  .doc table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.85rem; }
  .doc th { background: #1e293b; padding: 8px; text-align: left; color: #22c55e; border: 1px solid #334155; }
  .doc td { padding: 8px; border: 1px solid #334155; }
  .doc blockquote { border-left: 3px solid #22c55e; padding: 8px 16px; margin: 12px 0; background: #1e293b30; color: #94a3b8; }
  .doc hr { border: none; border-top: 1px solid #334155; margin: 20px 0; }
  .pw-gate { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .pw-gate input { padding: 12px 16px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 16px; width: 200px; margin-bottom: 12px; text-align: center; }
  .pw-gate button { padding: 12px 24px; border-radius: 8px; border: none; background: #22c55e; color: #0f172a; font-weight: 700; font-size: 16px; cursor: pointer; }
  .pw-gate h2 { color: #22c55e; margin-bottom: 20px; }
</style>
</head>
<body>
<div id="gate" class="pw-gate">
  <h2>🔒 XTP Strategy Docs</h2>
  <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()">
  <button onclick="unlock()">Enter</button>
</div>
<div id="app" style="display:none;">
  <div class="nav" id="nav"></div>
  <div id="docs"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const PW = 'xtp2026';
function unlock() {
  if (document.getElementById('pw').value === PW) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadDocs();
  } else { alert('Wrong password'); }
}

const docs = [
  { id: 'playbook', label: '⚡ Playbook', file: 'XTP-GROWTH-OPERATING-PLAYBOOK.md' },
  { id: 'onepager', label: '🎯 One-Pager', file: 'BRANDON-CRYPTO-EXPERT-ONEPAGER.md' },
  { id: 'strategy', label: '📊 Strategy', file: 'GROWTH-STRATEGY-2026.md' },
  { id: 'streamers', label: '🎮 Streamers', file: 'STREAMER-DATABASE.md' },
  { id: 'sources', label: '📚 Sources', file: 'RESEARCH-SOURCES.md' },
];

async function loadDocs() {
  const nav = document.getElementById('nav');
  const container = document.getElementById('docs');
  for (const d of docs) {
    // Nav button
    const a = document.createElement('a');
    a.href = '#';
    a.textContent = d.label;
    a.onclick = (e) => { e.preventDefault(); showDoc(d.id); };
    nav.appendChild(a);
    // Content
    const div = document.createElement('div');
    div.className = 'doc';
    div.id = 'doc-' + d.id;
    try {
      const res = await fetch(d.file + '?' + Date.now());
      const md = await res.text();
      div.innerHTML = marked.parse(md);
    } catch(e) { div.innerHTML = '<p>Failed to load ' + d.file + '</p>'; }
    container.appendChild(div);
  }
  const requested = (window.location.hash || '').replace('#', '');
  const defaultDoc = docs.some(d => d.id === requested) ? requested : 'playbook';
  showDoc(defaultDoc);
}

function showDoc(id) {
  document.querySelectorAll('.doc').forEach(d => d.classList.remove('active'));
  document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('doc-' + id).classList.add('active');
  const navLinks = document.querySelectorAll('.nav a');
  const idx = docs.findIndex(d => d.id === id);
  if (navLinks[idx]) navLinks[idx].classList.add('active');
  window.location.hash = id;
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
